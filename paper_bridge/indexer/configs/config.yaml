resources:
  project_name: paper-bridge
  stage: dev
  default_region_name: us-west-2
  bedrock_region_name: us-west-2
  # s3_bucket_name is injected via the S3_BUCKET_NAME env var (Terraform in AWS,
  # .env locally) — it is account/region-specific and must not be committed.
  s3_key_prefix: paper-bridge-dev/batch-extract

indexing:
  papers_per_day: 3
  days_to_fetch: 1
  min_upvotes: 10
  selection_popularity_weight: 0.6
  selection_recency_weight: 0.4
  selection_recency_half_life_days: 7.0
  use_llama_parse: False
  main_content_extraction_model_id: anthropic.claude-haiku-4-5-20251001-v1:0
  extraction_model_id: anthropic.claude-haiku-4-5-20251001-v1:0
  response_model_id: anthropic.claude-sonnet-4-6
  embeddings_model_id: cohere.embed-english-v3
  enable_batch_inference: False
  extraction_num_workers: 2
  extraction_num_threads_per_worker: 2
  extraction_batch_size: 4
  build_num_workers: 2
  build_batch_size: 4
  build_batch_write_size: 25
  batch_writes_enabled: True
  enable_cache: True
  chunk_size: 1024
  chunk_overlap: 128
