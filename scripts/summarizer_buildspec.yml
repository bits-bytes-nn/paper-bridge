version: 0.2

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPOSITORY_URI
      - IMAGE_TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}
      - echo "Resolved image tag $IMAGE_TAG"

  build:
    commands:
      - echo "Building the Docker image..."
      # Build from the repo root so paper_bridge/shared/ is in the build context.
      - docker build -f paper_bridge/summarizer/Dockerfile -t $ECR_REPOSITORY_URI:$IMAGE_TAG -t $ECR_REPOSITORY_URI:latest .

  post_build:
    commands:
      - echo "Pushing the Docker image..."
      - docker push $ECR_REPOSITORY_URI:$IMAGE_TAG
      - docker push $ECR_REPOSITORY_URI:latest
      - echo "Build completed on $(date)"
