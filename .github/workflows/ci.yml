name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.8.5"

jobs:
  lint:
    name: Lint & format & types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tooling
        run: pip install ruff==0.6.9 black==24.10.0 mypy==1.13.0

      - name: Ruff (lint)
        run: ruff check paper_bridge tests

      - name: Black (format check)
        run: black --check paper_bridge tests

      - name: Mypy (shared/ — blocking)
        # paper_bridge/shared is fully typed and is the most-reused code, so it
        # is a BLOCKING gate: a type regression here (the class of bug that let
        # the str-int / datetime mismatches reach production) fails CI. Expand
        # this allowlist module-by-module as each is cleaned.
        run: mypy paper_bridge/shared

      - name: Mypy (full — non-blocking)
        # The rest of the codebase is incrementally typed; report failures as a
        # non-blocking warning until each app's src is clean and promoted above.
        continue-on-error: true
        run: mypy paper_bridge

  test:
    name: Unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Install from pyproject.toml (the single source of truth) via poetry, so
      # CI tests exactly the declared dependency set — no hand-curated drift.
      # The heavy GraphRAG/Bedrock backends are imported lazily in the app, and
      # the unit tests mock them, so the suite runs without a live AWS/DB stack.
      - name: Install Poetry
        run: pipx install poetry==${{ env.POETRY_VERSION }}

      - name: Install dependencies (pyproject single source of truth)
        run: poetry install --with dev --no-interaction

      - name: Run tests with coverage
        run: |
          poetry run pytest tests/ \
            --cov=paper_bridge \
            --cov-report=term-missing \
            --cov-report=xml \
            -p no:cacheprovider \
            -rs

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install scanners
        run: pip install bandit==1.7.10 pip-audit==2.7.3

      # Both scanners are advisory (non-blocking) but REPORT findings — they use
      # continue-on-error instead of `|| true` so failures surface as warnings
      # rather than being silently swallowed.
      - name: Bandit (static security analysis)
        continue-on-error: true
        run: bandit -r paper_bridge -ll -x tests

      - name: pip-audit (dependency vulnerability scan)
        # Advisory: graphrag-toolkit/llama-index pin transitive deps we don't control.
        continue-on-error: true
        run: pip-audit --progress-spinner off

  docker:
    name: Docker build (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [cleaner, indexer, summarizer]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Validate the Dockerfile and build the image (no push). Build context is
      # the repo root so paper_bridge/shared/ is included, matching the buildspecs.
      # load: true so the smoke-import step below can run the image.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: paper_bridge/${{ matrix.app }}/Dockerfile
          push: false
          load: true
          tags: pb-${{ matrix.app }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Smoke-import inside the built image: proves paper_bridge.shared is present
      # (the boot-crash fix) and, for the summarizer, that the graphrag +
      # bedrock-converse backends actually co-import (the botocore-pin conflict
      # the HEALTHCHECK now guards) — so a broken image fails CI, not prod.
      - name: Smoke-import (shared package)
        run: |
          docker run --rm --entrypoint python pb-${{ matrix.app }}:ci \
            -c "import paper_bridge.shared; print('shared OK')"

      - name: Smoke-import (summarizer backends co-import)
        if: matrix.app == 'summarizer'
        run: |
          docker run --rm --entrypoint python pb-summarizer:ci -c "import graphrag_toolkit.lexical_graph; from llama_index.llms.bedrock_converse import BedrockConverse; from llama_index.core.llms import ChatMessage, ImageBlock, TextBlock; from llama_index.vector_stores.opensearch import OpensearchVectorStore; print('backends co-import OK')"

      # Import the actual entrypoint module chain inside the image. This is what
      # broke in prod: pipeline.py eagerly imports GitHubOutputHandler, whose
      # module did `from git import Repo` at top level, and GitPython probes for a
      # git binary at import time -> ImportError on an image without git. Importing
      # the chain here makes that class of failure fail CI, not a Batch run.
      - name: Smoke-import (summarizer pipeline entrypoint chain)
        if: matrix.app == 'summarizer'
        run: |
          docker run --rm --entrypoint python pb-summarizer:ci -c "import paper_bridge.summarizer.src.pipeline; print('pipeline entrypoint import OK')"

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform fmt check
        run: terraform -chdir=terraform fmt -check -recursive

      # `validate` requires `init`; use -backend=false so no remote state /
      # credentials are touched (read-only structural validation).
      - name: Terraform init (no backend)
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform validate
